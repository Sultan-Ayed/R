<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السبورة | تهجّي وتعلّم الكلمات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@600;700&family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#1f3b2c;
    --board-dark:#173026;
    --chalk:#f5f3ed;
    --chalk-dim:#c9c7bd;
    --chalk-yellow:#e8c468;
    --chalk-blue:#8fb8d8;
    --chalk-pink:#d98a8a;
    --chalk-green:#9fcf9f;
    --wood:#6b4226;
    --wood-dark:#4a2c19;
    --wood-light:#8a5a35;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 15%, #2a4a37 0%, transparent 45%),
      radial-gradient(circle at 80% 85%, #16281f 0%, transparent 50%),
      var(--wood-dark);
    font-family:'Tajawal', sans-serif;
    color:var(--chalk);
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }

  .frame{
    width:100%;
    max-width:760px;
    background:
      linear-gradient(180deg, var(--wood-light), var(--wood) 12%, var(--wood) 88%, var(--wood-dark));
    border-radius:14px;
    padding:18px;
    box-shadow:0 30px 60px rgba(0,0,0,.5), inset 0 0 0 2px rgba(0,0,0,.25);
  }

  .board{
    position:relative;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.035), transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(255,255,255,.03), transparent 50%),
      var(--board);
    border-radius:6px;
    padding:34px 28px 26px;
    box-shadow:inset 0 0 40px rgba(0,0,0,.55), inset 0 0 3px rgba(0,0,0,.6);
    overflow:hidden;
  }

  .board::before{
    /* chalk dust flecks */
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 30%, rgba(255,255,255,.15) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 42% 68%, rgba(255,255,255,.12) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 78% 22%, rgba(255,255,255,.1) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 88% 74%, rgba(255,255,255,.13) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 60% 12%, rgba(255,255,255,.1) 0, transparent 60%);
    pointer-events:none;
  }

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:12px;
    letter-spacing:.18em;
    color:var(--chalk-yellow);
    text-align:center;
    opacity:.85;
  }

  h1{
    font-family:'Permanent Marker', cursive;
    direction:ltr;
    font-size:clamp(30px,7vw,44px);
    text-align:center;
    margin:6px 0 2px;
    color:var(--chalk);
    transform:rotate(-1.2deg);
    text-shadow:0 0 1px rgba(255,255,255,.15);
  }

  .subtitle{
    text-align:center;
    color:var(--chalk-dim);
    font-size:14px;
    margin-bottom:22px;
  }

  .chalk-rule{
    border:none;
    height:2px;
    margin:22px 0;
    background:repeating-linear-gradient(90deg, rgba(245,243,237,.35) 0 10px, transparent 10px 18px);
  }

  label.field-label{
    display:block;
    font-size:14px;
    color:var(--chalk-dim);
    margin-bottom:8px;
  }

  .input-row{
    display:flex;
    gap:10px;
  }

  input[type=text]{
    flex:1;
    direction:ltr;
    text-align:left;
    font-family:'Space Mono', monospace;
    font-size:20px;
    padding:12px 14px;
    background:rgba(245,243,237,.06);
    border:2px dashed rgba(245,243,237,.4);
    border-radius:8px;
    color:var(--chalk);
    outline:none;
  }
  input[type=text]::placeholder{ color:rgba(245,243,237,.35); }
  input[type=text]:focus{ border-color:var(--chalk-yellow); background:rgba(245,243,237,.1); }

  button{
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:15px;
    padding:12px 20px;
    border-radius:8px;
    border:2px solid var(--chalk-yellow);
    background:transparent;
    color:var(--chalk-yellow);
    cursor:pointer;
    transition:transform .12s ease, background .15s ease, color .15s ease;
  }
  button:hover{ background:var(--chalk-yellow); color:var(--board-dark); }
  button:active{ transform:scale(.96); }
  button:focus-visible, input:focus-visible{ outline:3px solid var(--chalk-blue); outline-offset:2px; }
  button.secondary{ border-color:rgba(245,243,237,.4); color:var(--chalk-dim); }
  button.secondary:hover{ background:rgba(245,243,237,.15); color:var(--chalk); }
  button:disabled{ opacity:.35; cursor:not-allowed; }
  button:disabled:hover{ background:transparent; color:var(--chalk-yellow); }

  .result{ display:none; margin-top:26px; }
  .result.show{ display:block; }

  .card-label{
    font-size:12px;
    color:var(--chalk-dim);
    letter-spacing:.08em;
    margin-bottom:8px;
  }

  .syllables{
    direction:ltr;
    font-family:'Permanent Marker', cursive;
    font-size:clamp(26px,6vw,38px);
    color:var(--chalk);
    letter-spacing:.5px;
    line-height:1.5;
    word-break:break-word;
  }
  .syllables .dash{ color:var(--chalk-yellow); padding:0 6px; }
  .syllables .syl{ display:inline-block; }
  .syllables .syl:nth-child(4n+2){ color:var(--chalk-blue); }
  .syllables .syl:nth-child(4n+3){ color:var(--chalk-yellow); }
  .syllables .syl:nth-child(4n+4){ color:var(--chalk-pink); }

  .pronounce{
    margin-top:16px;
    font-family:'Caveat', cursive;
    font-size:clamp(24px,5.5vw,32px);
    color:var(--chalk-blue);
  }

  .note{
    font-size:12px;
    color:var(--chalk-dim);
    margin-top:6px;
    opacity:.75;
  }

  .quiz-box{ margin-top:8px; }

  .quiz-word{
    direction:ltr;
    font-family:'Space Mono', monospace;
    font-size:clamp(24px,6vw,34px);
    letter-spacing:6px;
    text-align:center;
    margin:18px 0 20px;
    color:var(--chalk);
  }
  .quiz-word .blank{
    color:var(--chalk-yellow);
    border-bottom:3px solid var(--chalk-yellow);
    padding:0 2px;
  }
  .quiz-word .revealed{ color:var(--chalk-dim); }
  .quiz-word .correct{ color:var(--chalk-green); }
  .quiz-word .wrong{ color:var(--chalk-pink); }

  .guess-row{
    display:flex;
    gap:10px;
    justify-content:center;
  }
  .guess-row input[type=text]{
    max-width:70px;
    text-align:center;
    font-size:24px;
    text-transform:lowercase;
  }

  .tally{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:18px 0 6px;
    direction:ltr;
  }
  .tally .mark{
    width:14px; height:34px;
    border-radius:2px;
    background:rgba(245,243,237,.15);
    border:1px solid rgba(245,243,237,.3);
    transform:rotate(-4deg);
  }
  .tally .mark.used-correct{ background:var(--chalk-green); border-color:var(--chalk-green); }
  .tally .mark.used-wrong{ background:var(--chalk-pink); border-color:var(--chalk-pink); }

  .feedback{
    text-align:center;
    min-height:22px;
    font-size:15px;
    margin-top:10px;
    font-weight:700;
  }
  .feedback.correct{ color:var(--chalk-green); }
  .feedback.wrong{ color:var(--chalk-pink); }

  .score-line{
    text-align:center;
    font-family:'Caveat', cursive;
    font-size:26px;
    color:var(--chalk-yellow);
    margin-top:14px;
  }

  .btn-row{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:18px;
    flex-wrap:wrap;
  }

  .tray{
    height:14px;
    margin-top:16px;
    border-radius:0 0 10px 10px;
    background:linear-gradient(180deg, var(--wood), var(--wood-dark));
    box-shadow:inset 0 3px 6px rgba(0,0,0,.4);
    position:relative;
  }
  .chalk-stub{
    position:absolute;
    bottom:6px; right:24%;
    width:38px; height:9px;
    background:var(--chalk-yellow);
    border-radius:3px;
    box-shadow:14px 2px 0 -1px var(--chalk-blue), -16px -1px 0 -1px var(--chalk-pink);
    opacity:.9;
  }

  @media (max-width:480px){
    .board{ padding:24px 16px 20px; }
    .syllables{ font-size:26px; }
  }
</style>
</head>
<body>

<div class="frame">
  <div class="board">
    <div class="eyebrow">VOCAB BOARD</div>
    <h1>Spell &amp; Say</h1>
    <p class="subtitle">اكتب كلمة إنجليزية، وخلها السبورة تفكّها لك مقاطع، وتنطقها بالعربي، وتختبرك فيها</p>

    <label class="field-label" for="wordInput">الكلمة</label>
    <div class="input-row">
      <input type="text" id="wordInput" placeholder="مثال: computer" autocomplete="off">
      <button id="goBtn">قسّمها</button>
    </div>

    <div class="result" id="result">

      <hr class="chalk-rule">

      <div class="card-label">المقاطع (Syllables)</div>
      <div class="syllables" id="syllablesOut"></div>

      <div class="pronounce" id="pronounceOut"></div>
      <div class="note">النطق تقريبي لمساعدتك على الحفظ، مو نطق علمي دقيق</div>

      <hr class="chalk-rule">

      <div class="card-label">اختبار الحروف — 6 محاولات</div>

      <div class="quiz-box" id="quizBox">
        <div class="tally" id="tally"></div>
        <div class="quiz-word" id="quizWord"></div>
        <div class="guess-row" id="guessRow">
          <input type="text" id="letterInput" maxlength="1" autocomplete="off">
          <button id="checkBtn">تحقق</button>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="score-line" id="scoreLine" style="display:none;"></div>
        <div class="btn-row">
          <button id="startQuizBtn">ابدأ الاختبار</button>
          <button id="restartQuizBtn" class="secondary" style="display:none;">أعد الاختبار</button>
        </div>
      </div>

    </div>

    <div class="tray"><div class="chalk-stub"></div></div>
  </div>
</div>

<script>
/* ---------- Syllable splitting (heuristic, English) ---------- */
function splitSyllables(word){
  const w = word.toLowerCase();
  const re = /[^aeiouy]*[aeiouy]+(?:[^aeiouy]*$|[^aeiouy](?=[^aeiouy]))?/gi;
  const parts = w.match(re);
  if(!parts || parts.length === 0) return [w];
  // re-case to match original word's letters positionally
  let out = [];
  let i = 0;
  for(const p of parts){
    out.push(word.slice(i, i + p.length));
    i += p.length;
  }
  if(i < word.length){ out[out.length-1] += word.slice(i); }
  return out;
}

/* ---------- Rough English -> Arabic phonetic approximation ---------- */
const DIGRAPHS = [
  ["tch","تش"], ["igh","اي"],
  ["sh","ش"], ["ch","تش"], ["th","ث"], ["ph","ف"], ["wh","و"],
  ["ng","نغ"], ["ck","ك"], ["qu","كو"],
  ["ee","ي"], ["ea","ي"], ["oo","و"], ["ou","او"], ["ow","او"],
  ["ai","ي"], ["ay","اي"], ["oy","وي"], ["oi","وي"],
  ["oa","و"], ["ie","اي"], ["ue","يو"], ["au","او"], ["aw","او"]
];

const SINGLES = {
  a:"ا", b:"ب", c:"ك", d:"د", e:"ي", f:"ف", g:"غ", h:"ه",
  i:"ي", j:"ج", k:"ك", l:"ل", m:"م", n:"ن", o:"و", p:"ب",
  q:"ك", r:"ر", s:"س", t:"ت", u:"و", v:"ف", w:"و", x:"كس",
  y:"ي", z:"ز"
};

function arabicForSyllable(syl){
  let s = syl.toLowerCase();
  let out = "";
  let i = 0;
  while(i < s.length){
    let matched = false;
    // soft c/g before e,i,y
    if(s[i] === "c" && /[eiy]/.test(s[i+1] || "")){
      out += "س"; i++; matched = true;
    } else if(s[i] === "g" && /[eiy]/.test(s[i+1] || "")){
      out += "ج"; i++; matched = true;
    }
    if(matched) continue;

    for(const [pat, ar] of DIGRAPHS){
      if(s.startsWith(pat, i)){
        out += ar;
        i += pat.length;
        matched = true;
        break;
      }
    }
    if(matched) continue;

    const ch = s[i];
    if(SINGLES[ch]) out += SINGLES[ch];
    i++;
  }
  return out || s;
}

function arabicPronunciation(word){
  const syls = splitSyllables(word);
  return syls.map(arabicForSyllable).join("-");
}

/* ---------- Wiring: split + pronounce ---------- */
const wordInput = document.getElementById("wordInput");
const goBtn = document.getElementById("goBtn");
const result = document.getElementById("result");
const syllablesOut = document.getElementById("syllablesOut");
const pronounceOut = document.getElementById("pronounceOut");

let currentWord = "";

function renderWord(){
  const raw = wordInput.value.trim();
  if(!raw) return;
  currentWord = raw.replace(/[^a-zA-Z]/g, "");
  if(!currentWord) return;

  const syls = splitSyllables(currentWord);
  syllablesOut.innerHTML = syls
    .map(s => `<span class="syl">${s}</span>`)
    .join('<span class="dash">·</span>');

  pronounceOut.textContent = "طريقة النطق: " + arabicPronunciation(currentWord);

  result.classList.add("show");
  resetQuiz();
}

goBtn.addEventListener("click", renderWord);
wordInput.addEventListener("keydown", e => { if(e.key === "Enter") renderWord(); });

/* ---------- Quiz: 6 rounds, one hidden letter each ---------- */
const quizWord = document.getElementById("quizWord");
const tally = document.getElementById("tally");
const letterInput = document.getElementById("letterInput");
const checkBtn = document.getElementById("checkBtn");
const feedback = document.getElementById("feedback");
const scoreLine = document.getElementById("scoreLine");
const startQuizBtn = document.getElementById("startQuizBtn");
const restartQuizBtn = document.getElementById("restartQuizBtn");
const guessRow = document.getElementById("guessRow");

const TOTAL_ROUNDS = 6;
let round = 0;
let score = 0;
let usedIndices = [];
let currentHiddenIndex = -1;
let roundResults = []; // 'pending' | 'correct' | 'wrong'
let quizActive = false;

function resetQuiz(){
  round = 0;
  score = 0;
  usedIndices = [];
  currentHiddenIndex = -1;
  roundResults = [];
  quizActive = false;
  quizWord.textContent = "";
  feedback.textContent = "";
  feedback.className = "feedback";
  scoreLine.style.display = "none";
  scoreLine.textContent = "";
  guessRow.style.display = "none";
  startQuizBtn.style.display = "inline-block";
  restartQuizBtn.style.display = "none";
  buildTally();
}

function buildTally(){
  tally.innerHTML = "";
  for(let i=0; i<TOTAL_ROUNDS; i++){
    const d = document.createElement("div");
    d.className = "mark";
    tally.appendChild(d);
  }
}

function updateTally(){
  const marks = tally.querySelectorAll(".mark");
  marks.forEach((m, idx) => {
    m.className = "mark";
    if(roundResults[idx] === "correct") m.classList.add("used-correct");
    else if(roundResults[idx] === "wrong") m.classList.add("used-wrong");
  });
}

function pickHiddenIndex(){
  const len = currentWord.length;
  if(usedIndices.length >= len) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * len); } while(usedIndices.includes(idx));
  usedIndices.push(idx);
  return idx;
}

function renderQuizWord(revealAll){
  let html = "";
  for(let i=0; i<currentWord.length; i++){
    const ch = currentWord[i];
    if(i === currentHiddenIndex && !revealAll){
      html += `<span class="blank">_</span>`;
    } else if(i === currentHiddenIndex && revealAll){
      const cls = feedback.className.includes("correct") ? "correct" : "wrong";
      html += `<span class="${cls}">${ch}</span>`;
    } else {
      html += `<span class="revealed">${ch}</span>`;
    }
  }
  quizWord.innerHTML = html;
}

function startRound(){
  if(round >= TOTAL_ROUNDS){
    finishQuiz();
    return;
  }
  currentHiddenIndex = pickHiddenIndex();
  feedback.textContent = "";
  feedback.className = "feedback";
  letterInput.value = "";
  guessRow.style.display = "flex";
  renderQuizWord(false);
  letterInput.focus();
}

function finishQuiz(){
  quizActive = false;
  guessRow.style.display = "none";
  scoreLine.style.display = "block";
  scoreLine.textContent = `نتيجتك: ${score} من ${TOTAL_ROUNDS} 🎯`;
  startQuizBtn.style.display = "none";
  restartQuizBtn.style.display = "inline-block";
}

function checkGuess(){
  if(!quizActive) return;
  const guess = letterInput.value.trim().toLowerCase();
  if(!guess) return;
  const actual = currentWord[currentHiddenIndex].toLowerCase();
  const isCorrect = guess === actual;

  if(isCorrect){
    score++;
    feedback.textContent = "صح! 👏";
    feedback.className = "feedback correct";
    roundResults[round] = "correct";
  } else {
    feedback.textContent = `خطأ، الحرف الصحيح: ${actual}`;
    feedback.className = "feedback wrong";
    roundResults[round] = "wrong";
  }
  renderQuizWord(true);
  updateTally();

  round++;
  guessRow.style.display = "none";

  setTimeout(() => {
    if(round < TOTAL_ROUNDS){
      startRound();
    } else {
      finishQuiz();
    }
  }, 1100);
}

startQuizBtn.addEventListener("click", () => {
  if(!currentWord) return;
  quizActive = true;
  round = 0; score = 0; usedIndices = []; roundResults = [];
  buildTally();
  startQuizBtn.style.display = "none";
  scoreLine.style.display = "none";
  startRound();
});

restartQuizBtn.addEventListener("click", () => {
  resetQuiz();
  quizActive = true;
  startQuizBtn.style.display = "none";
  startRound();
});

checkBtn.addEventListener("click", checkGuess);
letterInput.addEventListener("keydown", e => { if(e.key === "Enter") checkGuess(); });
</script>

</body>
</html>
