<style>
  :root{
    --bg-1:#eef4ec;
    --bg-2:#e2ede2;
    --paper:#fbfaf5;
    --ink:#213a2f;
    --ink-dim:#6d8579;
    --line:#d7e3d3;
    --sprout:#4f9d6e;
    --sprout-dark:#357350;
    --gold:#c99a45;
    --gold-soft:#e9d3a3;
    --rose:#cf8b8f;
    --sky:#6f9aab;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, var(--bg-2) 0%, transparent 45%),
      radial-gradient(circle at 90% 90%, #dfe9df 0%, transparent 55%),
      var(--bg-1);
    font-family:'Almarai', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:40px 16px 64px;
  }

  .card{
    width:100%;
    max-width:720px;
    background:var(--paper);
    border-radius:22px;
    padding:36px 30px 30px;
    box-shadow:0 20px 50px rgba(33,58,47,.12), 0 2px 8px rgba(33,58,47,.06);
    border:1px solid var(--line);
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:6px;
  }

  .brand svg{ width:26px; height:26px; }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.16em;
    color:var(--sprout-dark);
    text-align:center;
    text-transform:uppercase;
  }

  h1{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    direction:ltr;
    font-size:clamp(30px,6.5vw,42px);
    text-align:center;
    margin:4px 0 4px;
    color:var(--ink);
  }

  .subtitle{

    color:var(--ink-dim);

    margin-bottom:28px;
    line-height:1.6;
  }

    border:none;
    height:1px;

  label.field-label{
    display:block;
    font-size:13.5px;
    color:var(--ink-dim);
    margin-bottom:8px;
    font-weight:700;
  }

  .input-row{
    display:flex;
    gap:10px;
  }

  input[type=text]{

  button:disabled{ opacity:.35; cursor:not-allowed; }

  .result.show{ display:block; }

<script>
/* ---------- Syllable splitting (heuristic, English) ---------- */
function splitSyllables(word){
  const w = word.toLowerCase();
  const re = /[^aeiouy]*[aeiouy]+(?:[^aeiouy]*$|[^aeiouy](?=[^aeiouy]))?/gi;
  const parts = w.match(re);
  if(!parts || parts.length === 0) return [w];
  let out = [];
  let i = 0;
  for(const p of parts){
    out.push(word.slice(i, i + p.length));
    i += p.length;
  }
  if(i < word.length){ out[out.length-1] += word.slice(i); }
  return out;
}

/* ---------- Rough English -> Arabic phonetic approximation ---------- */
const DIGRAPHS = [
  ["tch","تش"], ["igh","اي"],
  ["sh","ش"], ["ch","تش"], ["th","ث"], ["ph","ف"], ["wh","و"],
  ["ng","نغ"], ["ck","ك"], ["qu","كو"],
  ["ee","ي"], ["ea","ي"], ["oo","و"], ["ou","او"], ["ow","او"],
  ["ai","ي"], ["ay","اي"], ["oy","وي"], ["oi","وي"],
  ["oa","و"], ["ie","اي"], ["ue","يو"], ["au","او"], ["aw","او"]
];

const SINGLES = {
  a:"ا", b:"ب", c:"ك", d:"د", e:"ي", f:"ف", g:"غ", h:"ه",
  i:"ي", j:"ج", k:"ك", l:"ل", m:"م", n:"ن", o:"و", p:"ب",
  q:"ك", r:"ر", s:"س", t:"ت", u:"و", v:"ف", w:"و", x:"كس",
  y:"ي", z:"ز"
};

function arabicForSyllable(syl){
  let s = syl.toLowerCase();
  let out = "";
  let i = 0;
  while(i < s.length){
    let matched = false;
    if(s[i] === "c" && /[eiy]/.test(s[i+1] || "")){
      out += "س"; i++; matched = true;
    } else if(s[i] === "g" && /[eiy]/.test(s[i+1] || "")){
      out += "ج"; i++; matched = true;
    }
    if(matched) continue;

    for(const [pat, ar] of DIGRAPHS){
      if(s.startsWith(pat, i)){
        out += ar;
        i += pat.length;
        matched = true;
        break;
      }
    }
    if(matched) continue;

    const ch = s[i];
    if(SINGLES[ch]) out += SINGLES[ch];
    i++;
  }
  return out || s;
}

function arabicPronunciation(word){
  const syls = splitSyllables(word);
  return syls.map(arabicForSyllable).join("-");
}

/* ---------- Wiring: split + pronounce ---------- */
const wordInput = document.getElementById("wordInput");
const goBtn = document.getElementById("goBtn");
const result = document.getElementById("result");
const syllablesOut = document.getElementById("syllablesOut");
const pronounceOut = document.getElementById("pronounceOut");
const translationOut = document.getElementById("translationOut");

let currentWord = "";
let translationRequestId = 0;

async function fetchTranslation(word){
  const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|ar`);
  if(!res.ok) throw new Error("network");
  const data = await res.json();
  const text = data && data.responseData && data.responseData.translatedText;
  if(!text || /^[a-zA-Z\s.,]+$/.test(text)) throw new Error("no-translation");
  return text;
}

function loadTranslation(word){
  const requestId = ++translationRequestId;
  translationOut.textContent = "جاري جلب الترجمة…";
  translationOut.className = "translation loading";

  fetchTranslation(word)
    .then(text => {
      if(requestId !== translationRequestId) return;
      translationOut.textContent = text;
      translationOut.className = "translation";
    })
    .catch(() => {
      if(requestId !== translationRequestId) return;
      translationOut.textContent = "تعذّر جلب الترجمة الآن، تحقق من الاتصال بالإنترنت";
      translationOut.className = "translation error";
    });
}

function renderWord(){
  const raw = wordInput.value.trim();
  if(!raw) return;
  currentWord = raw.replace(/[^a-zA-Z]/g, "");
  if(!currentWord) return;

  const syls = splitSyllables(currentWord);
  syllablesOut.innerHTML = syls.map(s => `<span class="syl">${s}</span>`).join("");

  pronounceOut.textContent = "طريقة النطق: " + arabicPronunciation(currentWord);
  loadTranslation(currentWord);

  result.classList.add("show");
  resetQuiz();
}

goBtn.addEventListener("click", renderWord);
wordInput.addEventListener("keydown", e => { if(e.key === "Enter") renderWord(); });

/* ---------- Quiz: 6 rounds, one hidden letter each, growth stem + ring ---------- */
const quizWord = document.getElementById("quizWord");
const stemSvg = document.getElementById("stemSvg");
const letterInput = document.getElementById("letterInput");
const checkBtn = document.getElementById("checkBtn");
const feedback = document.getElementById("feedback");
const growthResult = document.getElementById("growthResult");
const ringSvg = document.getElementById("ringSvg");
const ringLabel = document.getElementById("ringLabel");
const ringSub = document.getElementById("ringSub");
const startQuizBtn = document.getElementById("startQuizBtn");
const restartQuizBtn = document.getElementById("restartQuizBtn");
const guessRow = document.getElementById("guessRow");

const TOTAL_ROUNDS = 6;
let round = 0;
let score = 0;
let usedIndices = [];
let currentHiddenIndex = -1;
let roundResults = [];
let quizActive = false;

const SPROUT = "#4f9d6e";
const ROSE = "#cf8b8f";
const NEUTRAL = "#d7e3d3";
const GOLD = "#c99a45";

function buildStem(){
  const ns = "http://www.w3.org/2000/svg";
  stemSvg.innerHTML = "";
  const stem = document.createElementNS(ns, "path");
  stem.setAttribute("d", "M110 44 L110 8");
  stem.setAttribute("stroke", NEUTRAL);
  stem.setAttribute("stroke-width", "3");
  stem.setAttribute("stroke-linecap", "round");
  stemSvg.appendChild(stem);

  for(let i=0; i<TOTAL_ROUNDS; i++){
    const leaf = document.createElementNS(ns, "ellipse");
    const y = 40 - i*6;
    const side = i % 2 === 0 ? 1 : -1;
    leaf.setAttribute("cx", 110 + side*11);
    leaf.setAttribute("cy", y);
    leaf.setAttribute("rx", "9");
    leaf.setAttribute("ry", "5.5");
    leaf.setAttribute("transform", `rotate(${side*35} ${110+side*11} ${y})`);
    leaf.setAttribute("fill", NEUTRAL);
    leaf.setAttribute("id", "leaf-" + i);
    stemSvg.appendChild(leaf);
  }
}

function updateStem(){
  for(let i=0; i<TOTAL_ROUNDS; i++){
    const leaf = document.getElementById("leaf-" + i);
    if(!leaf) continue;
    if(roundResults[i] === "correct") leaf.setAttribute("fill", SPROUT);
    else if(roundResults[i] === "wrong") leaf.setAttribute("fill", ROSE);
    else leaf.setAttribute("fill", NEUTRAL);
  }
}

function resetQuiz(){
  round = 0;
  score = 0;
  usedIndices = [];
  currentHiddenIndex = -1;
  roundResults = [];
  quizActive = false;
  quizWord.textContent = "";
  feedback.textContent = "";
  feedback.className = "feedback";
  growthResult.classList.remove("show");
  guessRow.style.display = "none";
  startQuizBtn.style.display = "inline-block";
  restartQuizBtn.style.display = "none";
  buildStem();
}

function pickHiddenIndex(){
  const len = currentWord.length;
  if(usedIndices.length >= len) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * len); } while(usedIndices.includes(idx));
  usedIndices.push(idx);
  return idx;
}

function renderQuizWord(revealAll){
  let html = "";
  for(let i=0; i<currentWord.length; i++){
    const ch = currentWord[i];
    if(i === currentHiddenIndex && !revealAll){
      html += `<span class="blank">_</span>`;
    } else if(i === currentHiddenIndex && revealAll){
      const cls = feedback.className.includes("correct") ? "correct" : "wrong";
      html += `<span class="${cls}">${ch}</span>`;
    } else {
      html += `<span class="revealed">${ch}</span>`;
    }
  }
  quizWord.innerHTML = html;
}

function startRound(){
  if(round >= TOTAL_ROUNDS){
    finishQuiz();
    return;
  }
  currentHiddenIndex = pickHiddenIndex();
  feedback.textContent = "";
  feedback.className = "feedback";
  letterInput.value = "";
  guessRow.style.display = "flex";
  renderQuizWord(false);
  letterInput.focus();
}

function drawRing(pct){
  const ns = "http://www.w3.org/2000/svg";
  ringSvg.innerHTML = "";
  const r = 36, cx = 43, cy = 43;
  const circumference = 2 * Math.PI * r;

  const bg = document.createElementNS(ns, "circle");
  bg.setAttribute("cx", cx); bg.setAttribute("cy", cy); bg.setAttribute("r", r);
  bg.setAttribute("fill", "none"); bg.setAttribute("stroke", NEUTRAL); bg.setAttribute("stroke-width", "8");
  ringSvg.appendChild(bg);

  const fg = document.createElementNS(ns, "circle");
  fg.setAttribute("cx", cx); fg.setAttribute("cy", cy); fg.setAttribute("r", r);
  fg.setAttribute("fill", "none");
  fg.setAttribute("stroke", pct >= 0.5 ? SPROUT : GOLD);
  fg.setAttribute("stroke-width", "8");
  fg.setAttribute("stroke-linecap", "round");
  fg.setAttribute("stroke-dasharray", circumference);
  fg.setAttribute("stroke-dashoffset", circumference * (1 - pct));
  fg.setAttribute("transform", `rotate(-90 ${cx} ${cy})`);
  ringSvg.appendChild(fg);

  const txt = document.createElementNS(ns, "text");
  txt.setAttribute("x", cx); txt.setAttribute("y", cy + 5);
  txt.setAttribute("text-anchor", "middle");
  txt.setAttribute("font-family", "JetBrains Mono, monospace");
  txt.setAttribute("font-weight", "700");
  txt.setAttribute("font-size", "18");
  txt.setAttribute("fill", "#213a2f");
  txt.textContent = score + "/" + TOTAL_ROUNDS;
  ringSvg.appendChild(txt);
}

function finishQuiz(){
  quizActive = false;
  guessRow.style.display = "none";
  const pct = score / TOTAL_ROUNDS;
  drawRing(pct);
  growthResult.classList.add("show");

  let label, sub;
  if(pct === 1){ label = "إتقان كامل 🌿"; sub = "الكلمة صارت راسخة في ذاكرتك"; }
  else if(pct >= 0.66){ label = "تقدّم ممتاز"; sub = "قربت توصل للإتقان"; }
  else if(pct >= 0.33){ label = "في نمو"; sub = "راجع الكلمة وجرب مرة ثانية"; }
  else { label = "بداية الطريق"; sub = "كل محاولة تقربك للإتقان"; }
  ringLabel.textContent = label;
  ringSub.textContent = sub;

  startQuizBtn.style.display = "none";
  restartQuizBtn.style.display = "inline-block";
}

function checkGuess(){
  if(!quizActive) return;
  const guess = letterInput.value.trim().toLowerCase();
  if(!guess) return;
  const actual = currentWord[currentHiddenIndex].toLowerCase();
  const isCorrect = guess === actual;

  if(isCorrect){
    score++;
    feedback.textContent = "صح! 🌱";
    feedback.className = "feedback correct";
    roundResults[round] = "correct";
  } else {
    feedback.textContent = `خطأ، الحرف الصحيح: ${actual}`;
    feedback.className = "feedback wrong";
    roundResults[round] = "wrong";
  }
  renderQuizWord(true);
  updateStem();

  round++;
  guessRow.style.display = "none";

  setTimeout(() => {
    if(round < TOTAL_ROUNDS){
      startRound();
    } else {
      finishQuiz();
    }
  }, 1100);
}

startQuizBtn.addEventListener("click", () => {
  if(!currentWord) return;
  quizActive = true;
  round = 0; score = 0; usedIndices = []; roundResults = [];
  buildStem();
  startQuizBtn.style.display = "none";
  growthResult.classList.remove("show");
  startRound();
});

restartQuizBtn.addEventListener("click", () => {
  resetQuiz();
  quizActive = true;
  startQuizBtn.style.display = "none";
  startRound();
});

checkBtn.addEventListener("click", checkGuess);
letterInput.addEventListener("keydown", e => { if(e.key === "Enter") checkGuess(); });

buildStem();
</script>

</body>
</html>
